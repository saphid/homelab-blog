<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="container site-header__inner">
      <div class="brand-block">
        <a class="site-title" href="{{ '/' | relative_url }}">Saphid / Homelab</a>
        <p class="site-description">{{ site.description }}</p>
      </div>
      <nav class="site-nav" aria-label="Primary">
        <a href="{{ '/' | relative_url }}" data-nav-link>Home</a>
        <a href="{{ '/homelab-audit-snapshot-march-8-2026/' | relative_url }}" data-nav-link>Latest audit</a>
        <a href="{{ '/tags/' | relative_url }}" data-nav-link>Tags</a>
        <a href="{{ '/links.html' | relative_url }}" data-nav-link>Links</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <p>Verified notes, setup guides, and audit snapshots.</p>
      <p><a href="https://github.com/saphid/homelab-blog">Source</a></p>
    </div>
  </footer>

  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
