<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <div class="scroll-progress" aria-hidden="true"></div>
  <div class="page-shell">
    <header class="site-header">
      <div class="container">
        <a class="site-title" href="{{ '/' | relative_url }}">Saphid Signal Map</a>
        <nav class="site-nav">
          <a href="{{ '/' | relative_url }}">Home</a>
          <a href="{{ '/1/' | relative_url }}">Editorial</a>
          <a href="{{ '/2/' | relative_url }}">Control Panel</a>
          <a href="{{ '/3/' | relative_url }}">Organic</a>
          <a href="{{ '/4/' | relative_url }}">Brutalist</a>
          <a href="{{ '/5/' | relative_url }}">Lab</a>
          <a href="{{ '/links.html' | relative_url }}">Links</a>
          <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light mode">
            <span class="icon-sun">Sun</span>
            <span class="icon-moon">Moon</span>
          </button>
        </nav>
      </div>
    </header>

    <main class="site-main">
      <div class="container">
        {{ content }}
      </div>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; {{ 'now' | date: "%Y" }} Saphid &middot; Built with AI agents &middot; <a href="https://github.com/saphid/homelab-blog">Source</a></p>
      </div>
    </footer>
  </div>

  <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
</body>
</html>
